<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction AI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern tech look -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Medical AI Diagnostics</h1>
            <p>Advanced Diabetes Risk Prediction System</p>
        </header>

        <main>
            <form id="prediction-form">
                <div class="grid">
                    <div class="input-group">
                        <label for="pregnancies">Pregnancies</label>
                        <input type="number" id="pregnancies" name="pregnancies" required step="1" min="0"
                            placeholder="e.g. 2">
                    </div>
                    <div class="input-group">
                        <label for="glucose">Glucose Level</label>
                        <input type="number" id="glucose" name="glucose" required step="0.1" min="0"
                            placeholder="e.g. 120">
                    </div>
                    <div class="input-group">
                        <label for="bloodPressure">Blood Pressure</label>
                        <input type="number" id="bloodPressure" name="bloodPressure" required step="0.1" min="0"
                            placeholder="e.g. 70">
                    </div>
                    <div class="input-group">
                        <label for="skinThickness">Skin Thickness</label>
                        <input type="number" id="skinThickness" name="skinThickness" required step="0.1" min="0"
                            placeholder="e.g. 20">
                    </div>
                    <div class="input-group">
                        <label for="insulin">Insulin Level</label>
                        <input type="number" id="insulin" name="insulin" required step="0.1" min="0"
                            placeholder="e.g. 79">
                    </div>
                    <div class="input-group">
                        <label for="bmi">BMI</label>
                        <input type="number" id="bmi" name="bmi" required step="0.1" min="0" placeholder="e.g. 28.5">
                    </div>
                    <div class="input-group">
                        <label for="dpf">Diabetes Pedigree Function</label>
                        <input type="number" id="dpf" name="dpf" required step="0.001" min="0" placeholder="e.g. 0.45">
                    </div>
                    <div class="input-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" required step="1" min="0" placeholder="e.g. 33">
                    </div>
                </div>

                <button type="submit" id="predict-btn">Initialize Prediction</button>
            </form>

            <div id="result-container" class="hidden">
                <h2>Diagnostic Result</h2>
                <div id="result-box" class="result-box">
                    <span id="result-text">Waiting...</span>
                </div>
                <div id="error-box" class="error-box hidden"></div>
            </div>
        </main>

        <footer>
            <p>For research and educational purposes only.</p>
        </footer>
    </div>

    <script>
        document.getElementById('prediction-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('predict-btn');
            btn.textContent = "Analyzing Patient Data...";
            btn.disabled = true;

            const resultContainer = document.getElementById('result-container');
            const resultBox = document.getElementById('result-box');
            const resultText = document.getElementById('result-text');
            const errorBox = document.getElementById('error-box');

            resultContainer.classList.remove('hidden');
            resultBox.classList.remove('diabetic', 'non-diabetic');
            resultBox.classList.remove('hidden');
            errorBox.classList.add('hidden');
            resultText.textContent = "Processing neural network...";

            // Collect data from the form
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    if (result.result === "Diabetic") {
                        resultBox.classList.add('diabetic');
                        resultText.textContent = `ALERT: High Risk - ${result.result} (Confidence: ${(result.probability * 100).toFixed(1)}%)`;
                    } else {
                        resultBox.classList.add('non-diabetic');
                        resultText.textContent = `CLEAR: Low Risk - ${result.result} (Confidence: ${((1 - result.probability) * 100).toFixed(1)}%)`;
                    }
                } else {
                    resultBox.classList.add('hidden');
                    errorBox.classList.remove('hidden');
                    errorBox.textContent = `Error: ${result.error}`;
                }
            } catch (error) {
                resultBox.classList.add('hidden');
                errorBox.classList.remove('hidden');
                errorBox.textContent = `Connection Error: ${error.message}`;
            } finally {
                btn.textContent = "Initialize Prediction";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
